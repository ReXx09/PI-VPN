# =============================================================================
# HAUPTWOHNSITZ — Docker Compose
# Starlink + OPNsense + Raspberry Pi
# WireGuard-Server + DDNS-Updater (IPv6)
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # WireGuard-UI
  # Web-Oberfläche zur Verwaltung des WireGuard-Servers (Peers, Schlüssel, etc.)
  # Erreichbar unter: http://<raspi-ip>:5000
  # ---------------------------------------------------------------------------
  wireguard-ui:
    image: ngoduykhanh/wireguard-ui:latest
    container_name: wireguard-ui
    restart: unless-stopped

    # Nötig damit der Container das wg0-Interface direkt verwalten kann
    cap_add:
      - NET_ADMIN

    # HOST-Netzwerk: WireGuard-Interface wird direkt auf dem Host erstellt.
    # Darf NICHT in --network bridge laufen, da sonst wg0 nicht angelegt werden kann.
    network_mode: host

    environment:
      # --- Authentifizierung ---
      - WGUI_USERNAME=${WGUI_USERNAME:-admin}
      - WGUI_PASSWORD=${WGUI_PASSWORD}

      # --- WireGuard-Server-Einstellungen ---
      # Öffentlicher DDNS-Hostname (AAAA) des Servers, den Clients als Endpoint verwenden
      - WGUI_ENDPOINT_ADDRESS=${WGUI_ENDPOINT_HOSTNAME}
      - WGUI_SERVER_LISTEN_PORT=51820
      # Server-seitiges VPN-Interface + Subnetz
      - WGUI_SERVER_INTERFACE_ADDRESSES=10.10.0.1/24

      # DNS, den verbundene Clients nutzen (kann Heimnetz-DNS sein)
      - WGUI_DNS=${WGUI_DNS:-1.1.1.1,2606:4700:4700::1111}

      # MTU: Starlink empfiehlt 1280-1380 für IPv6-Tunnel
      - WGUI_MTU=${WGUI_MTU:-1280}

      # Keepalive damit der Tunnel hinter NAT/CGNAT aktiv bleibt
      - WGUI_PERSISTENT_KEEPALIVE=25

      # Pfad zur wg0.conf (muss mit dem wireguard-Volume übereinstimmen)
      - WGUI_CONFIG_FILE_PATH=/etc/wireguard/wg0.conf

      # Automatisch starten und neu starten wenn Konfig geändert wird
      - WGUI_MANAGE_START=true
      - WGUI_MANAGE_RESTART=true

      # Session-Secret (zufälliger langer String aus .env)
      - SESSION_SECRET=${SESSION_SECRET}

    volumes:
      # Datenbank der WebUI (Peer-Infos, Einstellungen)
      - ./data/db:/app/db
      # WireGuard-Konfigurationsdatei (wird von wgui verwaltet)
      - ./data/wireguard:/etc/wireguard

    # Logging begrenzen
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # DDNS-Go
  # Aktualisiert automatisch den DNS-AAAA-Record mit der aktuellen IPv6-Adresse
  # des Raspberry Pi (Starlink wechselt das Prefix regelmäßig).
  # WebUI: http://<raspi-ip>:9876
  # ---------------------------------------------------------------------------
  ddns-go:
    image: jeessy/ddns-go:latest
    container_name: ddns-go
    restart: unless-stopped

    # HOST-Netz damit ddns-go die echte IPv6-Adresse des Interfaces sieht
    network_mode: host

    volumes:
      # Persistente Konfiguration (API-Token, Domain, Zeitplan)
      - ./data/ddns-go:/root

    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
