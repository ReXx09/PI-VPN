# =============================================================================
# NEBENWOHNSITZ — Docker Compose
# Vodafone Kabel (DS-Lite) + Fritzbox 6660 + Raspberry Pi
# WireGuard-Client + DDNS-Updater (IPv6, optional)
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # WireGuard Client
  # Verbindet sich mit dem WireGuard-Server am Hauptwohnsitz via IPv6.
  # Die wg0.conf wird aus der wireguard-ui WebUI exportiert und hier abgelegt.
  # ---------------------------------------------------------------------------
  wireguard:
    image: linuxserver/wireguard:latest
    container_name: wireguard-client
    restart: unless-stopped

    cap_add:
      - NET_ADMIN
      - SYS_MODULE

    # Kernel-Modul-Zugriff (WireGuard ist ab Kernel 5.6 eingebaut)
    volumes:
      - /lib/modules:/lib/modules:ro
      - ./data/wireguard:/config

    # IPv4-Forwarding und IPv6-Forwarding aktivieren
    # (nötig damit der Tunnel als Gateway für andere Geräte dienen kann)
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Vienna

    # Interne Port-Exposition nicht nötig (Client initiiert Verbindung)
    # Aber für PostUp-Skripte mit iptables nötig:
    network_mode: host

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # DDNS-Go (optional am Nebenwohnsitz)
  # Nützlich wenn der Server die Client-IPv6 für Firewall-Regeln kennen muss.
  # Kann auch weggelassen werden wenn nur als Client gearbeitet wird.
  # WebUI: http://<raspi-ip>:9876
  # ---------------------------------------------------------------------------
  ddns-go:
    image: jeessy/ddns-go:latest
    container_name: ddns-go
    restart: unless-stopped

    network_mode: host

    volumes:
      - ./data/ddns-go:/root

    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
