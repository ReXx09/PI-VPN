# =============================================================================
# NEBENWOHNSITZ — Docker Compose (einziger Raspi-Stack)
# Vodafone Kabel (DS-Lite) + Fritzbox 6660 + Raspberry Pi
#
# Architektur:
#   Hauptwohnsitz → OPNsense mit WireGuard-Plugin (Server, kein Raspi dort)
#   Nebenwohnsitz → Dieser Raspi als WireGuard-Client + optionaler DDNS-Updater
#
# Vorbereitung:
#   1. In OPNsense: VPN → WireGuard → Peer anlegen → Konfig exportieren
#   2. Exportierte wg0.conf nach ./data/wireguard/wg0.conf kopieren
#   3. docker compose up -d
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # WireGuard Client
  # Verbindet sich mit dem OPNsense WireGuard-Server via IPv6.
  # Konfig: ./data/wireguard/wg0.conf  (aus OPNsense exportiert)
  # ---------------------------------------------------------------------------
  wireguard:
    image: linuxserver/wireguard:latest
    container_name: wireguard-client
    restart: unless-stopped

    cap_add:
      - NET_ADMIN
      - SYS_MODULE

    volumes:
      - /lib/modules:/lib/modules:ro
      - ./data/wireguard:/config

    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1

    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Vienna}

    # HOST-Netz: WireGuard-Interface (wg0) wird direkt auf dem Host
    # angelegt und iptables-MASQUERADE funktioniert für das Heimnetz.
    network_mode: host

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # DDNS-Go
  # Hält einen AAAA-Record für die aktuelle IPv6-Adresse des Raspi aktuell.
  # Nützlich falls OPNsense Firewall-Regeln auf die Client-IP matchen soll,
  # oder falls der Raspi selbst mal als Endpoint dienen soll.
  #
  # Hinweis: Die DDNS-Seite des Servers (OPNsense/Starlink) wird direkt in
  # OPNsense unter Dienste → Dynamisches DNS konfiguriert — kein Container nötig.
  #
  # WebUI: http://<raspi-ip>:9876
  # ---------------------------------------------------------------------------
  ddns-go:
    image: jeessy/ddns-go:latest
    container_name: ddns-go
    restart: unless-stopped

    network_mode: host

    volumes:
      - ./data/ddns-go:/root

    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
