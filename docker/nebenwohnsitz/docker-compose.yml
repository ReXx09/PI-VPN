# =============================================================================
# NEBENWOHNSITZ — Docker Compose (einziger Raspi-Stack)
# Vodafone Kabel (DS-Lite) + Fritzbox 6660 + Raspberry Pi
#
# Architektur:
#   Hauptwohnsitz → OPNsense mit WireGuard-Plugin (Server, kein Raspi dort)
#   Nebenwohnsitz → Dieser Raspi als WireGuard-Client mit Web-UI + DDNS-Updater
#
# Stack:
#   wireguard-ui  → verwaltet das native wg0-Interface + Web-UI auf Port 5000
#   ddns-go       → hält den AAAA-Record des Raspi aktuell (Port 9876)
#
# Hinweis zu "WireGuard nativ":
#   wireguard-ui nutzt intern wg-quick und das WireGuard-Kernelmodul
#   (ab Kernel 5.6 eingebaut, kein extra Container nötig).
#   linuxserver/wireguard wird deshalb NICHT benötigt — beide würden
#   sonst gleichzeitig wg0 verwalten und sich gegenseitig blockieren.
#
# Erststart:
#   1. cp .env.example .env && nano .env  (Passwörter setzen)
#   2. docker compose up -d
#   3. WebUI öffnen: http://<raspi-ip>:5000
#   4. WireGuard Server-Einstellungen prüfen (VPN-IP: 10.10.0.2/24)
#   5. Peer hinzufügen: OPNsense als Server eintragen (siehe .env.example)
#   6. "Apply Config" → Tunnel baut sich automatisch auf
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # WireGuard-UI
  # Verwaltet das native wg0-Interface via wg-quick (WireGuard-Kernelmodul).
  # WebUI zur Peer-Verwaltung und Tunnel-Status: http://<raspi-ip>:5000
  #
  # Konfiguration nach dem ersten Start in der WebUI:
  #   Schritt 1 — "WireGuard Server":
  #     - Endpoint: <leer lassen oder eigenen DDNS wenn nötig>
  #     - Listen Port: 51820
  #     - Server Address: 10.10.0.2/24
  #     - MTU: 1280
  #     - DNS: 10.10.0.1 (OPNsense) oder 1.1.1.1
  #     - Post Up/Down: optional iptables MASQUERADE für LAN-Routing
  #
  #   Schritt 2 — "Wireguard Clients" → "+ New Client" (= OPNsense als Peer):
  #     - Name: OPNsense-Server
  #     - Public Key: <öffentlicher Schlüssel des OPNsense WireGuard-Servers>
  #     - Allocated IPs: 10.10.0.1/32
  #     - Allowed IPs: 10.10.0.0/24, 192.168.10.0/24 (Split) ODER 0.0.0.0/0 (Full)
  #     - Endpoint: vpn-home.deine-domain.de:51820
  #     - Persistent Keepalive: 25
  #
  #   → "Apply Config" klicken → wg0 startet automatisch
  # ---------------------------------------------------------------------------
  wireguard-ui:
    image: ngoduykhanh/wireguard-ui:latest
    container_name: wireguard-ui
    restart: unless-stopped

    cap_add:
      - NET_ADMIN

    # HOST-Netz: wg0 wird direkt auf dem Host angelegt.
    # Nur so funktioniert wg-quick korrekt und iptables-MASQUERADE
    # für das Fritzbox-Heimnetz (192.168.20.0/24) greift.
    network_mode: host

    environment:
      # --- Login ---
      - WGUI_USERNAME=${WGUI_USERNAME:-admin}
      - WGUI_PASSWORD=${WGUI_PASSWORD}

      # --- WireGuard Interface (dieser Raspi als Client) ---
      - WGUI_SERVER_INTERFACE_ADDRESSES=10.10.0.2/24
      - WGUI_SERVER_LISTEN_PORT=51820
      - WGUI_MTU=${WGUI_MTU:-1280}
      - WGUI_DNS=${WGUI_DNS:-10.10.0.1,1.1.1.1}
      - WGUI_PERSISTENT_KEEPALIVE=25

      # Konfigurationsdatei (wird von wireguard-ui verwaltet)
      - WGUI_CONFIG_FILE_PATH=/etc/wireguard/wg0.conf

      # WireGuard automatisch starten und bei Änderung neu starten
      - WGUI_MANAGE_START=true
      - WGUI_MANAGE_RESTART=true

      # Session-Secret (zufälliger String: openssl rand -hex 32)
      - SESSION_SECRET=${SESSION_SECRET}

    volumes:
      # WebUI-Datenbank (Peer-Keys, Einstellungen)
      - ./data/db:/app/db
      # WireGuard wg0.conf (wird von wireguard-ui geschrieben)
      - ./data/wireguard:/etc/wireguard

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # DDNS-Go
  # Hält einen AAAA-Record für die aktuelle IPv6-Adresse des Raspi aktuell.
  # Nützlich falls OPNsense Firewall-Regeln auf die Client-IPv6 matchen soll.
  #
  # Hinweis: Den AAAA-Record des SERVERS (OPNsense/Starlink) konfiguriert man
  # direkt in OPNsense unter Dienste → Dynamisches DNS.
  #
  # WebUI: http://<raspi-ip>:9876
  # ---------------------------------------------------------------------------
  ddns-go:
    image: jeessy/ddns-go:latest
    container_name: ddns-go
    restart: unless-stopped

    network_mode: host

    volumes:
      - ./data/ddns-go:/root

    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
